<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Soluciones GEF | Seguridad y Tecnología</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600;800&family=Open+Sans&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Open Sans',sans-serif;
    background:#000;
    color:#fff;
}

/* NAV */
nav{
    position:fixed;
    width:100%;
    top:0;
    background:rgba(0,0,0,0.85);
    backdrop-filter:blur(10px);
    padding:15px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    z-index:1000;
}

nav a{
    color:#fff;
    text-decoration:none;
    margin-left:20px;
}

/* HERO */
.hero{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    position:relative;
    overflow:hidden;
}

.hero video{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-2;
}

.overlay{
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
    z-index:-1;
}

.logo-hero{
    width:170px;
    margin-bottom:20px;
}

h1{
    font-size:55px;
    font-family:'Montserrat';
}

.gold{color:#c8a96a;}

h2{
    font-family:'Montserrat';
}

/* BOTONES */
.btn{
    padding:12px 26px;
    border:1px solid #c8a96a;
    color:#c8a96a;
    border-radius:30px;
    text-decoration:none;
    margin:10px;
    transition:0.3s;
}

.btn:hover{
    background:#c8a96a;
    color:#000;
}

/* SECCIONES */
section{
    padding:90px 20px;
    text-align:center;
}

/* SERVICIOS */
.grid{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
}

.card{
    width:250px;
    background:#111;
    padding:12px;
    border-radius:12px;
}

.card img{
    width:100%;
    height:150px;
    object-fit:cover;
    border-radius:10px;
    margin-bottom:10px;
}

/* PROYECTOS */
.carousel{
    position:relative;
    width:90%;
    max-width:900px;
    margin:auto;
    overflow:hidden;
    border-radius:15px;
}

.slides{
    display:flex;
    transition:transform 0.6s ease-in-out;
}

.slides img{
    width:100%;
    flex-shrink:0;
    height:420px;
    object-fit:cover;
}

.prev,.next{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    background:rgba(0,0,0,0.6);
    border:none;
    color:white;
    padding:10px;
    border-radius:50%;
    cursor:pointer;
}

.prev{left:10px;}
.next{right:10px;}

/* MARCAS */
.brands{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:25px;
    opacity:0.9;
}

.brands span{
    background:#111;
    padding:10px 15px;
    border-radius:8px;
}

#map{
    width:90%;
    height:400

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Soluciones GEF | Seguridad y Tecnología</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Open+Sans&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Open Sans',sans-serif;
    background:#000;
    color:#fff;
}

/* HERO */
.hero{
    height:100vh;
    position:relative;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.hero video{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-2;
}

.overlay{
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.75);
    z-index:-1;
}

/* LOGO FIXED */
.logo{
    width:160px;
    margin-bottom:25px;
    display:block;
    position:relative;
    z-index:2;
    animation: fadeUp 1.5s ease, float 4s ease-in-out infinite, glow 2s infinite alternate;
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform: translateY(40px);
    }
    to{
        opacity:1;
        transform: translateY(0);
    }
}

@keyframes float{
    0%,100%{transform: translateY(0);}
    50%{transform: translateY(-8px);}
}

@keyframes glow{
    from{
        filter: drop-shadow(0 0 8px rgba(200,169,106,0.6));
    }
    to{
        filter: drop-shadow(0 0 20px rgba(200,169,106,1));
    }
}

.hero h1{
    font-family:'Montserrat';
    font-size:55px;
}

.gold{color:#c8a96a;}

.frase{
    max-width:700px;
    color:#ccc;
    font-size:20px;
}

/* BOTONES */
.botones{
    margin-top:40px;
    display:flex;
    gap:20px;
    flex-wrap:wrap;
    justify-content:center;
}

.btn{
    padding:12px 28px;
    border:1px solid #c8a96a;
    color:#c8a96a;
    border-radius:30px;
    text-decoration:none;
    transition:.3s;
}

.btn:hover{
    background:#c8a96a;
    color:#000;
}

/* SECCIONES */
section{
    padding:80px 20px;
    text-align:center;
}

/* SERVICIOS */
.grid{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
}

.card{
    width:260px;
    background:#111;
    padding:15px;
    border-radius:12px;
}

.card img{
    width:100%;
    height:160px;
    object-fit:cover;
    border-radius:10px;
}

/* CARRUSEL */
.carousel{
    overflow:hidden;
    max-width:900px;
    margin:auto;
}

.slides{
    display:flex;
    transition:0.6s;
}

.slides img{
    width:100%;
    height:400px;
    object-fit:cover;
}

/* MAPA */
#map{
    width:90%;
    height:400px;
    margin:auto;
    border-radius:12px;
}

/* WHATSAPP */
.whatsapp{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#25D366;
    padding:15px;
    border-radius:50%;
    font-size:22px;
    color:white;
    text-decoration:none;
}

footer{
    text-align:center;
    padding:20px;
    color:#777;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">

<video autoplay muted loop playsinline>
<source src="https://cdn.coverr.co/videos/coverr-security-camera-3775/1080p.mp4">
</video>

<div class="overlay"></div>

<!-- LOGO -->
<img src="https://i.imgur.com/98MHMI1.jpeg" class="logo" alt="Logo GEF">

<h1>SOLUCIONES <span class="gold">GEF</span></h1>

<p class="frase">
Protegemos tu hogar o negocio con soluciones profesionales en seguridad,
electricidad y redes. Instalación rápida, confiable y sin complicaciones.
</p>

<p style="margin-top:10px;color:#c8a96a;">
✔ Atención inmediata &nbsp; ✔ Instalación profesional &nbsp; ✔ Cobertura nacional
</p>

<div class="botones">
<a href="https://wa.me/528116112044?text=Hola,%20quiero%20cotizar" class="btn">💬 Cotizar</a>
<a href="tel:+528116112044" class="btn">📞 Llamar</a>
</div>

</div>

<!-- RESTO IGUAL (SERVICIOS, PROYECTOS, MAPA, ETC.) -->

</body>
</html>
